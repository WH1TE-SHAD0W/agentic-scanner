<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Colono-Extract{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='tailwind.css') }}">
  {% block head %}{% endblock %}
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <header class="bg-white border-b border-slate-200">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="{{ url_for('index') }}" class="text-lg font-semibold tracking-tight">Colono-Extract</a>
      <span class="text-xs text-slate-500">lokálny PHI filter &middot; Gemini extrakcia</span>
    </div>
  </header>
  <main class="max-w-5xl mx-auto px-6 py-8">
    {% with messages = get_flashed_messages() %}
      {% for m in messages %}
        <div class="mb-4 rounded-lg bg-amber-50 border border-amber-300 text-amber-900 px-4 py-3 text-sm">{{ m }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
